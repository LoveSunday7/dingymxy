<!-- 管理员面板 - 半透明毛玻璃风格 -->
<div class="admin-panel" id="adminPanel" style="display:none;">
    <div class="admin-overlay" id="adminOverlay"></div>
    <div class="admin-glass">
        <!-- 顶部：站点信息 -->
        <div class="admin-top">
            <div class="admin-brand">
                <i class="fas fa-sun"></i>
                <span>黑色小窝</span>
                <span class="admin-badge">管理面板</span>
            </div>
            <button class="admin-close" id="adminClose">&times;</button>
        </div>

        <!-- 统计卡片 -->
        <div class="admin-stats" id="adminStats">
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(33,150,243,0.15);color:#2196f3;"><i class="fas fa-users"></i></div>
                <div class="stat-body">
                    <div class="stat-value" id="statUsers">-</div>
                    <div class="stat-label">注册访客</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(76,175,80,0.15);color:#4caf50;"><i class="fas fa-file-alt"></i></div>
                <div class="stat-body">
                    <div class="stat-value" id="statPosts">-</div>
                    <div class="stat-label">文章数量</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(255,152,0,0.15);color:#ff9800;"><i class="fas fa-eye"></i></div>
                <div class="stat-body">
                    <div class="stat-value" id="statViews">-</div>
                    <div class="stat-label">总浏览量</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(233,30,99,0.15);color:#e91e63;"><i class="fas fa-heart"></i></div>
                <div class="stat-body">
                    <div class="stat-value" id="statLikes">-</div>
                    <div class="stat-label">总点赞</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(156,39,176,0.15);color:#9c27b0;"><i class="fas fa-comments"></i></div>
                <div class="stat-body">
                    <div class="stat-value" id="statComments">-</div>
                    <div class="stat-label">评论数</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:rgba(0,188,212,0.15);color:#00bcd4;"><i class="fas fa-envelope-open-text"></i></div>
                <div class="stat-body">
                    <div class="stat-value" id="statMessages">-</div>
                    <div class="stat-label">留言数</div>
                </div>
            </div>
        </div>

        <!-- Tab 切换 -->
        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="users">
                <i class="fas fa-users-cog"></i> 用户与权限
            </button>
            <button class="admin-tab" data-tab="public-pages">
                <i class="fas fa-globe-asia"></i> 公开页面
            </button>
        </div>

        <!-- 用户管理 -->
        <div class="admin-tab-content active" id="tab-users">
            <div class="admin-toolbar">
                <input type="text" id="userSearch" placeholder="搜索用户..." class="admin-input">
                <button class="admin-btn primary" id="addUserBtn">
                    <i class="fas fa-user-plus"></i> 添加访客
                </button>
            </div>
            <div class="admin-user-cards" id="userCards"></div>
            <div class="admin-pagination" id="usersPagination"></div>
        </div>

        <!-- 公开页面 -->
        <div class="admin-tab-content" id="tab-public-pages">
            <p class="admin-hint"><i class="fas fa-info-circle"></i> 勾选的页面无需登录即可访问</p>
            <div class="public-page-list" id="publicPageList"></div>
            <div class="admin-form-actions" style="margin-top:1.2rem;">
                <button class="admin-btn primary" id="savePublicPagesBtn">
                    <i class="fas fa-save"></i> 保存设置
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 添加/编辑用户弹窗 -->
<div class="admin-modal" id="userFormModal" style="display:none;">
    <div class="admin-overlay" id="userFormOverlay"></div>
    <div class="admin-modal-card" style="max-width:460px;">
        <h4 id="userFormTitle">添加访客</h4>
        <input type="hidden" id="editUserId" value="">
        <div class="admin-form-grid">
            <div class="admin-form-group">
                <label><i class="fas fa-user"></i> 姓名 <span class="required">*</span></label>
                <input type="text" id="formName" placeholder="请输入姓名" class="admin-input">
            </div>
            <div class="admin-form-group">
                <label><i class="fas fa-phone"></i> 手机</label>
                <input type="text" id="formPhone" placeholder="选填" class="admin-input">
            </div>
            <div class="admin-form-group">
                <label><i class="fas fa-envelope"></i> 邮箱</label>
                <input type="text" id="formEmail" placeholder="选填" class="admin-input">
            </div>
            <div class="admin-form-group">
                <label><i class="fab fa-weixin"></i> 微信</label>
                <input type="text" id="formWechat" placeholder="选填" class="admin-input">
            </div>
            <div class="admin-form-group">
                <label><i class="fab fa-qq"></i> QQ</label>
                <input type="text" id="formQQ" placeholder="选填" class="admin-input">
            </div>
        </div>
        <div class="admin-modal-actions">
            <button class="admin-btn" id="cancelUserForm">取消</button>
            <button class="admin-btn primary" id="confirmUserForm">确认</button>
        </div>
    </div>
</div>

<!-- 权限管理弹窗 -->
<div class="admin-modal" id="permModal" style="display:none;">
    <div class="admin-overlay" id="permOverlay"></div>
    <div class="admin-modal-card" style="max-width:500px;">
        <h4><i class="fas fa-key"></i> 页面权限</h4>
        <p class="perm-user-name" id="permUserName"></p>
        <div class="perm-check-list" id="permCheckList"></div>
        <div class="admin-modal-actions">
            <button class="admin-btn" id="cancelPerm">关闭</button>
            <button class="admin-btn primary" id="savePerm"><i class="fas fa-save"></i> 保存权限</button>
        </div>
    </div>
</div>
