<!-- 管理员面板 - 全屏管理后台 -->
<div class="admin-panel" id="adminPanel" style="display:none;">
    <div class="admin-glass">
        <!-- 顶栏 -->
        <div class="admin-top">
            <div class="admin-brand">
                <i class="fas fa-cog"></i>
                <span>黑色小窝</span>
                <span class="admin-badge">管理面板</span>
            </div>
            <button class="admin-close" id="adminClose">&times;</button>
        </div>

        <!-- Tab 切换 -->
        <div class="admin-tabs">
            <button class="admin-tab active" data-tab="system">
                <i class="fas fa-heartbeat"></i> 系统状态
            </button>
            <button class="admin-tab" data-tab="users">
                <i class="fas fa-users-cog"></i> 用户与权限
            </button>
            <button class="admin-tab" data-tab="messages">
                <i class="fas fa-comment-dots"></i> 留言管理
            </button>
            <button class="admin-tab" data-tab="public-pages">
                <i class="fas fa-globe-asia"></i> 公开页面
            </button>
            <button class="admin-tab" data-tab="resume-admin">
                <i class="fas fa-file-alt"></i> 简历管理
            </button>
            <button class="admin-tab" data-tab="experience-admin">
                <i class="fas fa-pencil-alt"></i> 经历管理
            </button>
            <button class="admin-tab" data-tab="friends-admin">
                <i class="fas fa-users"></i> 朋友圈管理
            </button>
        </div>

        <!-- 系统状态（默认激活） -->
        <div class="admin-tab-content active" id="tab-system">
            <div class="admin-section-header">
                <i class="fas fa-heartbeat"></i>
                <span class="admin-section-title">运行状态</span>
            </div>
            <div class="system-grid">
                <!-- 服务器状态 -->
                <div class="system-card">
                    <div class="system-card-header">
                        <i class="fas fa-server"></i> 服务器
                    </div>
                    <div class="system-metrics">
                        <div class="system-metric">
                            <span class="label">连接状态</span>
                            <span class="value online" id="sysStatus">检测中...</span>
                        </div>
                        <div class="system-metric">
                            <span class="label">响应时间</span>
                            <span class="value" id="sysLatency">-</span>
                        </div>
                        <div class="system-metric">
                            <span class="label">运行时间</span>
                            <span class="value" id="sysUptime">-</span>
                        </div>
                        <div class="system-metric">
                            <span class="label">服务器时间</span>
                            <span class="value" id="sysTime">-</span>
                        </div>
                    </div>
                </div>
                <!-- 数据概览 -->
                <div class="system-card">
                    <div class="system-card-header">
                        <i class="fas fa-database"></i> 数据概览
                    </div>
                    <div class="system-db-list" id="sysDbStats"></div>
                </div>
                <!-- 系统信息 -->
                <div class="system-card full">
                    <div class="system-card-header">
                        <i class="fas fa-info-circle"></i> 系统信息
                    </div>
                    <div class="system-metrics">
                        <div class="system-metric">
                            <span class="label">前端框架</span>
                            <span class="value">原生 JavaScript + CSS</span>
                        </div>
                        <div class="system-metric">
                            <span class="label">后端框架</span>
                            <span class="value">FastAPI (Python)</span>
                        </div>
                        <div class="system-metric">
                            <span class="label">数据库</span>
                            <span class="value">SQLite</span>
                        </div>
                        <div class="system-metric">
                            <span class="label">实时刷新</span>
                            <span class="value" id="sysAutoRefresh">每 30 秒</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 用户管理 -->
        <div class="admin-tab-content" id="tab-users">
            <div class="admin-toolbar">
                <input type="text" id="userSearch" placeholder="搜索用户..." class="admin-input">
                <button class="admin-btn primary" id="addUserBtn">
                    <i class="fas fa-user-plus"></i> 添加访客
                </button>
            </div>
            <div class="admin-user-cards" id="userCards"></div>
            <div class="admin-pagination" id="usersPagination"></div>
        </div>

        <!-- 留言管理 -->
        <div class="admin-tab-content" id="tab-messages">
            <div class="admin-section-header">
                <i class="fas fa-comment-dots"></i>
                <span class="admin-section-title">留言列表</span>
                <span class="admin-section-badge" id="msgTotalBadge">0</span>
            </div>
            <div id="adminMessagesList"></div>
            <div class="admin-pagination" id="messagesPagination"></div>
            <div class="admin-section-header" style="margin-top:0.8rem;">
                <i class="fas fa-shield-alt"></i>
                <span class="admin-section-title">留言配置</span>
            </div>
            <div class="admin-config-display" id="msgConfigDisplay">
                <div class="admin-empty">点击「留言管理」标签加载配置</div>
            </div>
        </div>

        <!-- 公开页面 -->
        <div class="admin-tab-content" id="tab-public-pages">
            <div class="admin-section-header">
                <i class="fas fa-globe-asia"></i>
                <span class="admin-section-title">公开页面</span>
            </div>
            <p class="admin-hint"><i class="fas fa-info-circle"></i> 勾选的页面无需登录即可访问</p>
            <div class="public-page-list" id="publicPageList"></div>
            <div class="admin-form-actions" style="margin-top:0.6rem;">
                <button class="admin-btn primary" id="savePublicPagesBtn">
                    <i class="fas fa-save"></i> 保存设置
                </button>
            </div>
        </div>
        <!-- 简历管理 -->
        <div class="admin-tab-content" id="tab-resume-admin">
            <div class="admin-toolbar">
                <button class="admin-btn primary" id="saveResumeBtn">
                    <i class="fas fa-save"></i> 保存全部修改
                </button>
                <span class="admin-hint-inline" id="resumeSaveStatus"></span>
            </div>
            <div class="admin-resume-editor" id="adminResumeEditor">
                <div class="admin-empty"><i class="fas fa-spinner fa-pulse"></i>加载中...</div>
            </div>
        </div>

        <!-- 经历管理 -->
        <div class="admin-tab-content" id="tab-experience-admin">
            <div class="admin-sub-tabs" id="expSubTabs">
                <button class="admin-sub-tab active" data-sub="timeline">时间线事件</button>
                <button class="admin-sub-tab" data-sub="projects">项目经历</button>
            </div>
            <div class="admin-toolbar">
                <button class="admin-btn primary" id="addExpItemBtn">
                    <i class="fas fa-plus"></i> <span id="addExpItemLabel">添加事件</span>
                </button>
            </div>
            <div class="admin-list-container" id="adminExpList">
                <div class="admin-empty"><i class="fas fa-spinner fa-pulse"></i>加载中...</div>
            </div>
        </div>

        <!-- 朋友圈管理 -->
        <div class="admin-tab-content" id="tab-friends-admin">
            <div class="admin-toolbar">
                <button class="admin-btn primary" id="addMomentBtn">
                    <i class="fas fa-plus"></i> 发布新动态
                </button>
            </div>
            <div class="admin-list-container" id="adminMomentsList">
                <div class="admin-empty"><i class="fas fa-spinner fa-pulse"></i>加载中...</div>
            </div>
        </div>
    </div>
</div>

<!-- 通用管理表单弹窗 -->
<div class="admin-modal" id="adminFormModal" style="display:none;">
    <div class="admin-overlay" id="adminFormOverlay"></div>
    <div class="admin-modal-card" id="adminFormCard">
        <h4 id="adminFormTitle"><i class="fas fa-edit"></i> 表单</h4>
        <div id="adminFormBody"></div>
        <div class="admin-modal-actions">
            <button class="admin-btn" id="cancelAdminForm">取消</button>
            <button class="admin-btn primary" id="confirmAdminForm">确认</button>
        </div>
    </div>
</div>
<div class="admin-modal" id="userFormModal" style="display:none;">
    <div class="admin-overlay" id="userFormOverlay"></div>
    <div class="admin-modal-card">
        <h4><i class="fas fa-user-cog"></i> <span id="userFormTitle">添加访客</span></h4>
        <input type="hidden" id="editUserId" value="">
        <div class="admin-form-grid">
            <div class="admin-form-group">
                <label><i class="fas fa-user"></i> 姓名 <span class="required">*</span></label>
                <input type="text" id="formName" placeholder="请输入姓名" class="admin-input">
            </div>
            <div class="admin-form-group">
                <label><i class="fas fa-phone"></i> 手机</label>
                <input type="text" id="formPhone" placeholder="选填" class="admin-input">
            </div>
            <div class="admin-form-group">
                <label><i class="fas fa-envelope"></i> 邮箱</label>
                <input type="text" id="formEmail" placeholder="选填" class="admin-input">
            </div>
            <div class="admin-form-group">
                <label><i class="fab fa-weixin"></i> 微信</label>
                <input type="text" id="formWechat" placeholder="选填" class="admin-input">
            </div>
            <div class="admin-form-group">
                <label><i class="fab fa-qq"></i> QQ</label>
                <input type="text" id="formQQ" placeholder="选填" class="admin-input">
            </div>
        </div>
        <div class="admin-modal-actions">
            <button class="admin-btn" id="cancelUserForm">取消</button>
            <button class="admin-btn primary" id="confirmUserForm">确认</button>
        </div>
    </div>
</div>
