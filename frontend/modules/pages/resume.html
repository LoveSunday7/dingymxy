<div class="container">
    <h2 class="page-title">个人简历</h2>

    <!-- 基本信息 - 动态加载 -->
    <div class="card" id="resumeBasicInfoCard">
        <h3><i class="fas fa-user-circle"></i> 基本信息</h3>
        <div class="resume-section" id="resumeBasicInfo">
            <div class="info-grid" id="resumeInfoGrid"></div>
        </div>
    </div>

    <!-- 个人简介 - 动态加载 -->
    <div class="card" id="resumeBioCard">
        <h3><i class="fas fa-user-tie"></i> 个人简介</h3>
        <div class="resume-section" id="resumeBio"></div>
    </div>

    <!-- 专业技能 - 动态加载 -->
    <div class="card" id="resumeSkillsCard">
        <h3><i class="fas fa-code"></i> 专业技能</h3>
        <div class="resume-section">
            <div class="skills-container" id="resumeSkills"></div>
        </div>
    </div>

    <!-- 工作经历 - 动态加载 (从时间线事件 API) -->
    <div class="card" id="resumeWorkExpCard">
        <h3><i class="fas fa-briefcase"></i> 工作经历</h3>
        <div class="resume-section" id="resumeWorkExp"></div>
    </div>

    <!-- 项目经历 - 动态加载 -->
    <div class="card" id="resumeProjectsCard">
        <h3><i class="fas fa-project-diagram"></i> 项目经历</h3>
        <div class="resume-section" id="resumeProjects"></div>
    </div>

    <!-- 教育背景 - 动态加载 -->
    <div class="card" id="resumeEducationCard">
        <h3><i class="fas fa-graduation-cap"></i> 教育背景</h3>
        <div class="resume-section" id="resumeEducation"></div>
    </div>

    <!-- 荣誉证书 - 动态加载 (可选，无数据时隐藏) -->
    <div class="card" id="resumeCertsCard" style="display:none;">
        <h3><i class="fas fa-award"></i> 荣誉证书</h3>
        <div class="resume-section">
            <div class="awards-grid" id="resumeCerts"></div>
        </div>
    </div>

    <!-- 个人特质 - 动态加载 -->
    <div class="card" id="resumeTraitsCard">
        <h3><i class="fas fa-star"></i> 个人特质</h3>
        <div class="resume-section">
            <div class="traits-grid" id="resumeTraits"></div>
        </div>
    </div>
</div>
